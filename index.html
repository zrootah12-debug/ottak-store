<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Otaku Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #ff0000, #990000);
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 20px red;
    }

    header img {
      width: 120px;
      border-radius: 50%;
      box-shadow: 0 0 20px black;
    }

    h1 {
      margin: 10px 0;
      font-size: 40px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111;
      border: 2px solid red;
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px red;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      background: red;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: darkred;
    }

    .cart {
      background: #111;
      border-top: 2px solid red;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <!-- حط صورة اللوجو بنفس الاسم -->
  <img src="logo.png">
  <h1>Otaku Store</h1>
  <p>متجر عشاق الأنمي 🔥</p>
</header>

<div class="products" id="products"></div>

<div class="cart">
  <h2>🛒 السلة</h2>
  <div id="cart"></div>
</div>

<script>
const products = [
  {name:"ستيكر اتاك", price:20, img:"https://images.unsplash.com/photo-1608889175123"},
  {name:"تيشيرت انمي", price:400, img:"https://images.unsplash.com/photo-1618354691321"},
  {name:"حقيبة", price:250, img:"https://images.unsplash.com/photo-1598032895397"},
];

let cart = [];

function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="addToCart(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  const c = document.getElementById("cart");
  c.innerHTML = "";

  cart.forEach(item=>{
    c.innerHTML += `<p>${item.name} - ${item.price} جنيه</p>`;
  });
}

renderProducts();
</script>

</body>
</html>
