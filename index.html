<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Otaku Store</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#ff0000,#990000);
  text-align:center;
  padding:30px;
  box-shadow:0 0 30px red;
}

header img{
  width:120px;
}

h1{
  margin:10px 0;
  font-size:40px;
}

/* SEARCH */
.search{
  padding:20px;
  text-align:center;
}

.search input{
  width:80%;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  border:2px solid red;
  border-radius:15px;
  padding:15px;
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px red;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTON */
button{
  background:red;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:darkred;
}

/* CART */
.cart{
  background:#111;
  padding:20px;
  border-top:2px solid red;
}

.whatsapp{
  background:green;
  margin-top:10px;
}
</style>

</head>

<body>

<header>
  <!-- حط اللوجو بنفس الاسم -->
  <img src="logo.png">
  <h1>Otaku Store</h1>
  <p>متجر عشاق الأنمي 🔥</p>
</header>

<div class="search">
  <input id="search" placeholder="🔍 ابحث عن منتج..." onkeyup="renderProducts()">
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h2>🛒 السلة</h2>
  <div id="cart"></div>
  <p id="total"></p>
  <button class="whatsapp" onclick="order()">اطلب عبر واتساب</button>
</div>

<script>

const products = [
{
  name:"تيشيرت اتاك",
  price:400,
  img:"https://images.unsplash.com/photo-1618354691321-e851c56960d5"
},
{
  name:"حقيبة انمي",
  price:250,
  img:"https://images.unsplash.com/photo-1598032895397-b9472444bf93"
},
{
  name:"مج دراجون بول",
  price:80,
  img:"https://images.unsplash.com/photo-1585386959984-a41552231658"
}
];

let cart = [];

function renderProducts(){
  const container = document.getElementById("products");
  const search = document.getElementById("search").value.toLowerCase();

  container.innerHTML = "";

  products
  .filter(p=>p.name.toLowerCase().includes(search))
  .forEach((p,i)=>{
    container.innerHTML += `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>${p.price} جنيه</p>
      <button onclick="add(${i})">أضف للسلة</button>
    </div>
    `;
  });
}

function add(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  const c = document.getElementById("cart");
  const t = document.getElementById("total");

  c.innerHTML = "";
  let total = 0;

  cart.forEach(item=>{
    c.innerHTML += `<p>${item.name} - ${item.price} جنيه</p>`;
    total += item.price;
  });

  t.innerHTML = "الإجمالي: " + total + " جنيه";
}

function order(){
  let text = cart.map(i=>i.name).join("%0A");
  window.open("https://wa.me/201125210875?text=طلب:%0A"+text);
}

renderProducts();

</script>

</body>
</html>
