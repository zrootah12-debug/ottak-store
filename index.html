<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0e0e0e;
  color: white;
}

/* 🔴 هيدر */
.header {
  background: linear-gradient(45deg, #ff0000, #ff5e5e);
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* 🧢 لوجو لوفي صغير */
.logo {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid white;
}

.title {
  font-size: 22px;
  font-weight: bold;
}

/* 🎌 بانر */
.banner img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* 🛍️ المنتجات */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
  font-size: 16px;
}

.price {
  color: #ff4d4d;
  margin: 0 10px;
}

button {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  width: calc(100% - 20px);
  cursor: pointer;
}

/* 🛒 السلة */
.cart {
  background: white;
  color: black;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- 🔴 الهيدر -->
<div class="header">
  <img class="logo"
  src="https://upload.wikimedia.org/wikipedia/en/6/6f/Monkey_D._Luffy.png">
  <div class="title">🔥 Atuko Store 🔥</div>
</div>

<!-- 🎌 بانر -->
<div class="banner">
  <img src="https://wallpapercave.com/wp/wp8432343.jpg">
</div>

<!-- 🛍️ المنتجات -->
<div class="products" id="products"></div>

<!-- 🛒 السلة -->
<div class="cart">
  <h3>🛒 السلة (<span id="count">0</span>)</h3>
  <div id="cartItems"></div>
  <hr>
  <b>الإجمالي: <span id="total">0</span> جنيه</b>
</div>

<script>
const products = [
  {
    name: "ستيكر لوفي",
    price: 20,
    image: "https://upload.wikimedia.org/wikipedia/en/6/6f/Monkey_D._Luffy.png"
  },
  {
    name: "تيشيرت ون بيس",
    price: 400,
    image: "https://wallpapercave.com/wp/wp7433809.jpg"
  },
  {
    name: "شنطة انمي",
    price: 250,
    image: "https://wallpapercave.com/wp/wp8432343.jpg"
  },
  {
    name: "مج دراجون بول",
    price: 50,
    image: "https://wallpapercave.com/wp/wp2757874.jpg"
  }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price} جنيه</p>
        <button onclick="addToCart(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  updateCart();
}

function updateCart() {
  let total = 0;
  let html = "";

  cart.forEach((item) => {
    total += item.price;
    html += `<div>${item.name} - ${item.price} جنيه</div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
