<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffe4ec;
  text-align: center;
}

/* هيدر */
.header {
  background: #ff9aa2;
  padding: 20px;
}

.logo {
  width: 120px;
}

h1 {
  margin: 10px 0;
}

/* منتجات */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: #ff6b81;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 10px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">
  <img class="logo" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  <h1>🎀 Atuko Store 🎀</h1>
</div>

<div class="products">

  <div class="card">
    <img src="https://picsum.photos/200?1">
    <p>ستيكر انمي</p>
    <button>أضف</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/200?2">
    <p>تيشيرت انمي</p>
    <button>أضف</button>
  </div>

</div>

</body>
</html>
