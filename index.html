<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* الهيدر */
.header {
  text-align: center;
  padding: 30px;
  background: linear-gradient(45deg, red, orange);
}

.logo {
  width: 250px;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

.title {
  font-size: 28px;
}

/* المنتجات */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 20px;
  padding: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  border-radius: 15px;
  object-fit: cover;
}

button {
  background: linear-gradient(45deg, red, orange);
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
  margin-top: 10px;
}

/* السلة */
.cart {
  background: white;
  color: black;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="header">
  <!-- لوجو أنمي -->
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/en/6/6f/Monkey_D._Luffy.png">
  <div class="title">🔥 Atuko Store 🔥</div>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h2>السلة (<span id="count">0</span>)</h2>
  <div id="cartItems"></div>
  <hr>
  <b>الإجمالي: <span id="total">0</span> جنيه</b>
</div>

<script>
const products = [
  {
    name: "ستيكر اتاك اون تايتن",
    price: 20,
    image: "https://picsum.photos/300/200?1"
  },
  {
    name: "تيشيرت اتاك اون تايتن",
    price: 400,
    image: "https://picsum.photos/300/200?2"
  },
  {
    name: "شنطة اتاك اون تايتن",
    price: 250,
    image: "https://picsum.photos/300/200?3"
  },
  {
    name: "تيشيرت غوجو",
    price: 300,
    image: "https://picsum.photos/300/200?4"
  },
  {
    name: "مج دراجون بول",
    price: 50,
    image: "https://picsum.photos/300/200?5"
  }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="addToCart(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  updateCart();
}

function updateCart() {
  let total = 0;
  let html = "";

  cart.forEach((item) => {
    total += item.price;
    html += `<div>${item.name} - ${item.price} جنيه</div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
