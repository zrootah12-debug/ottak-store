<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
}

/* الهيدر */
.header {
  background: linear-gradient(45deg, #ff0000, #ff4d4d);
  padding: 10px;
  text-align: center;
  color: white;
}

/* 🔥 لوجو صغير جدًا */
.logo {
  width: 60px; /* ← صغّرته جامد */
  border-radius: 50%;
  border: 2px solid white;
}

.title {
  font-size: 20px;
  margin-top: 5px;
}

/* المنتجات */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  overflow: hidden;
  color: white;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

button {
  margin: 10px;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  width: calc(100% - 20px);
}
</style>
</head>

<body>

<!-- هيدر -->
<div class="header">
  <!-- 🧢 لوفي Gear 5 (واضح) -->
  <img class="logo" src="https://i.pinimg.com/736x/7d/2c/5b/7d2c5b8d5e0e0e0f4f4f4f4f4f4f4f4f.jpg">
  <div class="title">🔥 Atuko Store 🔥</div>
</div>

<!-- منتجات -->
<div class="products">

  <div class="card">
    <img src="https://i.pinimg.com/736x/61/7e/1c/617e1c4d8f0e7a6c9d3e1c7e8a9f3f3f.jpg">
    <p>ستيكر انمي</p>
    <button>أضف</button>
  </div>

  <div class="card">
    <img src="https://i.pinimg.com/736x/0c/84/0d/0c840d89a0c9e7c3f3b7c9e8f2f3d3c.jpg">
    <p>تيشيرت انمي</p>
    <button>أضف</button>
  </div>

</div>

</body>
</html>
