<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
}

/* الهيدر */
.header {
  background: linear-gradient(45deg, #ff0000, #ff4d4d);
  padding: 15px;
  text-align: center;
  color: white;
}

/* لوجو صغير */
.logo {
  width: 90px;
  border-radius: 50%;
  border: 3px solid white;
}

.title {
  font-size: 24px;
  margin-top: 5px;
}

/* بانر */
.banner {
  width: 90%;
  margin: 15px auto;
  border-radius: 20px;
  overflow: hidden;
}

.banner img {
  width: 100%;
}

/* المنتجات */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* كارت */
.card {
  background: #1a1a1a;
  border-radius: 20px;
  overflow: hidden;
  color: white;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
}

.card p {
  margin: 0 10px;
  color: #ccc;
}

button {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  width: calc(100% - 20px);
  cursor: pointer;
}
</style>
</head>

<body>

<!-- هيدر -->
<div class="header">
  <!-- لوجو لوفي Gear 5 -->
  <img class="logo" src="https://i.pinimg.com/736x/3e/9a/7e/3e9a7e0c6b7d8c2c3b9e9f9a3f4f4f4f.jpg">
  <div class="title">🔥 Atuko Store 🔥</div>
</div>

<!-- بانر -->
<div class="banner">
  <img src="https://wallpapercave.com/wp/wp8432343.jpg">
</div>

<!-- منتجات -->
<div class="products">

  <div class="card">
    <img src="https://i.pinimg.com/736x/61/7e/1c/617e1c4d8f0e7a6c9d3e1c7e8a9f3f3f.jpg">
    <h3>ستيكر اتاك اون تايتن</h3>
    <p>20 جنيه</p>
    <button>أضف للسلة</button>
  </div>

  <div class="card">
    <img src="https://i.pinimg.com/736x/0c/84/0d/0c840d89a0c9e7c3f3b7c9e8f2f3d3c.jpg">
    <h3>تيشيرت انمي</h3>
    <p>400 جنيه</p>
    <button>أضف للسلة</button>
  </div>

  <div class="card">
    <img src="https://i.pinimg.com/736x/5a/43/28/5a4328c3a4c2f9c1d8f3c2e9d7a3c2.jpg">
    <h3>شنطة انمي</h3>
    <p>250 جنيه</p>
    <button>أضف للسلة</button>
  </div>

  <div class="card">
    <img src="https://i.pinimg.com/736x/aa/3b/44/aa3b44b2f3f2c3c3d9d8c2b7a6a6a6.jpg">
    <h3>مج دراجون بول</h3>
    <p>50 جنيه</p>
    <button>أضف للسلة</button>
  </div>

</div>

</body>
</html>
