<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

/* هيدر */
.header {
  text-align: center;
  padding: 15px;
  background: linear-gradient(45deg, #ff0000, #ff8800);
}

.logo {
  width: 180px;
  border-radius: 20px;
}

.title {
  font-size: 22px;
  margin-top: 10px;
}

/* منتجات */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  border-radius: 10px;
  object-fit: cover;
}

button {
  background: #ff0000;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* سلة */
.cart {
  background: white;
  color: black;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- لوجو طفولي أنمي -->
<div class="header">
  <img class="logo" src="https://i.imgur.com/2DhmtJ4.png">
  <div class="title">✨ Atuko Store ✨</div>
</div>

<!-- منتجات -->
<div class="products" id="products"></div>

<!-- سلة -->
<div class="cart">
  <h3>السلة (<span id="count">0</span>)</h3>
  <div id="cartItems"></div>
  <hr>
  <b>الإجمالي: <span id="total">0</span> جنيه</b>
</div>

<script>
const products = [
  {
    name: "ستيكر اتاك اون تايتن",
    price: 20,
    image: "https://i.imgur.com/3ZQ3Z4B.png"
  },
  {
    name: "تيشيرت اتاك اون تايتن",
    price: 400,
    image: "https://i.imgur.com/Vn4K7Wq.jpg"
  },
  {
    name: "شنطة اتاك اون تايتن",
    price: 250,
    image: "https://i.imgur.com/1X6p7Jz.jpg"
  },
  {
    name: "تيشيرت غوجو",
    price: 300,
    image: "https://i.imgur.com/8yKQF5R.jpg"
  },
  {
    name: "مج دراجون بول",
    price: 50,
    image: "https://i.imgur.com/l49aYS3.jpg"
  }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="addToCart(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  updateCart();
}

function updateCart() {
  let total = 0;
  let html = "";

  cart.forEach((item, i) => {
    total += item.price;
    html += `<div>${item.name} - ${item.price}</div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
