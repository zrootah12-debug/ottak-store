<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Otaku Store</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(to bottom, #000, #1a0033);
  color:white;
}

/* Header */
header {
  text-align:center;
  padding:20px;
  font-size:30px;
  color:#c084fc;
  font-weight:bold;
}

/* Search */
.search {
  width:90%;
  margin:auto;
  display:block;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}

/* Grid */
.products {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* Card */
.card {
  background:#111;
  border:1px solid #9333ea;
  border-radius:15px;
  padding:10px;
  transition:0.3s;
  box-shadow:0 0 15px rgba(147,51,234,0.5);
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.price {
  color:#22c55e;
  font-weight:bold;
}

/* Button */
button {
  width:100%;
  padding:10px;
  background:#9333ea;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* Cart */
.cart {
  background:#111;
  margin:20px;
  padding:15px;
  border-radius:15px;
  border:1px solid #9333ea;
}
</style>
</head>

<body>

<header>🗾 Otaku Store</header>

<input class="search" id="search" placeholder="🔍 ابحث عن منتج...">

<div class="products" id="products"></div>

<div class="cart">
<h2>🛒 السلة (<span id="count">0</span>)</h2>
<div id="cartItems"></div>
<p>🚚 التوصيل: 20 جنيه</p>
<p><b>💰 الإجمالي: <span id="total">0</span> جنيه</b></p>
<button onclick="checkout()">اطلب عبر واتساب</button>
</div>

<script>
const products = [
{
id:1,
name:"تيشيرت غوجو",
price:300,
img:"https://images.unsplash.com/photo-1611605698335-8b1569810432"
},
{
id:2,
name:"شنطة انمي",
price:250,
img:"https://images.unsplash.com/photo-1598032895397-b9472444bf93"
},
{
id:3,
name:"مج دراجون بول",
price:50,
img:"https://images.unsplash.com/photo-1585386959984-a41552231658"
}
];

let cart=[];

function renderProducts(list){
document.getElementById("products").innerHTML =
list.map(p=>`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price} جنيه</p>
<button onclick="add(${p.id})">🛒 أضف للسلة</button>
</div>
`).join("");
}

function add(id){
let item = cart.find(i=>i.id===id);
if(item){item.qty++}
else{
let p = products.find(x=>x.id===id);
cart.push({...p,qty:1});
}
renderCart();
}

function renderCart(){
document.getElementById("count").innerText = cart.length;

document.getElementById("cartItems").innerHTML =
cart.map(c=>`
<p>${c.name} × ${c.qty}</p>
`).join("");

let total = cart.reduce((s,i)=>s+i.price*i.qty,0);
document.getElementById("total").innerText = total+20;
}

function checkout(){
let msg = cart.map(c=>`${c.name} x ${c.qty}`).join("%0A");
window.open(`https://wa.me/201125210875?text=طلب:%0A${msg}`);
}

document.getElementById("search").oninput = e=>{
let val = e.target.value.toLowerCase();
renderProducts(products.filter(p=>p.name.toLowerCase().includes(val)));
};

renderProducts(products);
</script>

</body>
</html>
