<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff0f5;
  color: #333;
}

/* الهيدر */
.header {
  text-align: center;
  padding: 25px;
  background: linear-gradient(45deg, #ff9a9e, #fad0c4);
}

.logo {
  width: 180px;
  border-radius: 50%;
}

.title {
  font-size: 26px;
  margin-top: 10px;
}

/* المنتجات */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* الكارت */
.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: scale(1.05);
}

/* استيكر كيوت */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: #ff6b6b;
  color: white;
  padding: 5px 10px;
  border-radius: 15px;
  font-size: 12px;
}

.card img {
  width: 100%;
  height: 150px;
  border-radius: 15px;
  object-fit: cover;
}

button {
  background: #ff9a9e;
  border: none;
  padding: 10px;
  border-radius: 15px;
  color: white;
  font-weight: bold;
  margin-top: 10px;
  cursor: pointer;
}

/* السلة */
.cart {
  background: #fff;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- هيدر -->
<div class="header">
  <img class="logo" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
  <div class="title">🎀 Atuko Store 🎀</div>
</div>

<!-- منتجات -->
<div class="products" id="products"></div>

<!-- سلة -->
<div class="cart">
  <h2>🛒 السلة (<span id="count">0</span>)</h2>
  <div id="cartItems"></div>
  <hr>
  <b>الإجمالي: <span id="total">0</span> جنيه</b>
</div>

<script>
const products = [
  {
    name: "ستيكر انمي",
    price: 20,
    image: "https://picsum.photos/200/150?1",
    badge: "كيوت"
  },
  {
    name: "تيشيرت انمي",
    price: 400,
    image: "https://picsum.photos/200/150?2",
    badge: "🔥"
  },
  {
    name: "شنطة انمي",
    price: 250,
    image: "https://picsum.photos/200/150?3",
    badge: "جديد"
  },
  {
    name: "مج انمي",
    price: 50,
    image: "https://picsum.photos/200/150?4",
    badge: "⭐"
  }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <div class="badge">${p.badge}</div>
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="addToCart(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  updateCart();
}

function updateCart() {
  let total = 0;
  let html = "";

  cart.forEach((item) => {
    total += item.price;
    html += `<div>${item.name} - ${item.price} جنيه</div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
