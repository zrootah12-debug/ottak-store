<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.header {
  background: linear-gradient(135deg, red, orange);
  padding: 20px;
}

.logo {
  width: 200px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 15px;
}

button {
  background: red;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="header">
  <!-- اللوجو -->
  <img class="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." />
  <h2>🔥 Atuko Store 🔥</h2>
</div>

<div class="products">
  <div class="card">منتج 1</div>
  <div class="card">منتج 2</div>
</div>

</body>
</html>
