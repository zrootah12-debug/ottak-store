<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Otaku Store</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      color: #a855f7;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      border: 1px solid purple;
      padding: 10px;
      border-radius: 10px;
    }

    button {
      background: purple;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      background: #222;
      color: white;
      border: 1px solid purple;
    }
  </style>
</head>
<body>

<h1>🗾 Otaku Store</h1>
<p style="text-align:center;">متجر عشاق الأنمي 🔥</p>

<input type="text" id="search" placeholder="🔍 ابحث...">

<div class="products" id="products"></div>

<h2>🛒 السلة</h2>
<div id="cart"></div>

<script>
const products = [
  {name:"ستيكر اتاك", price:20},
  {name:"تيشيرت اتاك", price:400},
  {name:"شنطة اتاك", price:250},
];

let cart = [];

function renderProducts(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="addToCart('${p.name}', ${p.price})">اضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  const c = document.getElementById("cart");
  c.innerHTML = "";

  cart.forEach(i=>{
    c.innerHTML += `<p>${i.name} - ${i.price} جنيه</p>`;
  });
}

document.getElementById("search").addEventListener("input", (e)=>{
  const val = e.target.value;
  const filtered = products.filter(p=>p.name.includes(val));
  renderProducts(filtered);
});

renderProducts(products);
</script>

</body>
</html>
