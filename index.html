<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial;
  background: radial-gradient(circle, #1a0000, #000);
  color: white;
  overflow-x: hidden;
}

/* 🔥 خلفية أنمي */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://wallpapercave.com/wp/wp8432343.jpg') no-repeat center;
  background-size: cover;
  opacity: 0.15;
  z-index: -1;
}

/* 🧢 الهيدر */
.header {
  text-align: center;
  padding: 20px;
}

/* لوجو لوفي جير 5 */
.logo {
  width: 120px;
  border-radius: 50%;
  border: 4px solid red;
  box-shadow: 0 0 20px red;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

.title {
  font-size: 28px;
  margin-top: 10px;
  color: #ff3b3b;
}

/* 🎮 المنتجات */
.products {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* 🧸 كارت مش مربع */
.card {
  width: 200px;
  background: #1a1a1a;
  border-radius: 25px;
  padding: 10px;
  text-align: center;
  position: relative;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1) rotate(-2deg);
}

/* صورة دائرية */
.card img {
  width: 100%;
  height: 160px;
  border-radius: 20px;
  object-fit: cover;
}

/* استيكر كيوت */
.badge {
  position: absolute;
  top: -10px;
  right: -10px;
  background: red;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* زر */
button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 15px;
  background: red;
  color: white;
  cursor: pointer;
}

/* 🛒 السلة */
.cart {
  background: white;
  color: black;
  margin: 20px;
  padding: 15px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🧢 هيدر -->
<div class="header">
  <img class="logo" src="https://i.pinimg.com/736x/9d/8f/8c/9d8f8c7d7b7d7b7d7b7d7b7d7b7d7b7d.jpg">
  <div class="title">🔥 Atuko Store 🔥</div>
</div>

<!-- 🎮 منتجات -->
<div class="products" id="products"></div>

<!-- 🛒 سلة -->
<div class="cart">
  <h3>🛒 السلة (<span id="count">0</span>)</h3>
  <div id="cartItems"></div>
</div>

<script>
const products = [
  {
    name: "ستيكر لوفي",
    image: "https://i.pinimg.com/736x/7d/2c/5b/7d2c5b8d5e0e0e0f4f4f4f4f4f4f4f4f.jpg",
    badge: "🔥"
  },
  {
    name: "تيشيرت ون بيس",
    image: "https://i.pinimg.com/736x/0c/84/0d/0c840d89a0c9e7c3f3b7c9e8f2f3d3c.jpg",
    badge: "⭐"
  },
  {
    name: "شنطة انمي",
    image: "https://i.pinimg.com/736x/5a/43/28/5a4328c3a4c2f9c1d8f3c2e9d7a3c2.jpg",
    badge: "🎮"
  }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <div class="badge">${p.badge}</div>
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <button onclick="addToCart(${i})">أضف</button>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  document.getElementById("count").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
