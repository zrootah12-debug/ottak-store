<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Atuko Store</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --red: #ff2e2e;
  --dark: #0d0d0d;
  --card: #1a1a1a;
  --text: #ffffff;
}

body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(to bottom, #0d0d0d, #1a1a1a);
  color: white;
}

/* 🔴 HEADER */
.header {
  position: sticky;
  top: 0;
  background: linear-gradient(45deg, #ff0000cc, #ff4d4dcc);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

.logo {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: 2px solid white;
  transition: 0.3s;
}

.logo:hover {
  transform: scale(1.1) rotate(10deg);
}

.title {
  font-weight: bold;
}

/* 🎌 BANNER */
.banner img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* 🛍️ PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: var(--card);
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
  font-size: 16px;
}

.price {
  color: var(--red);
  margin: 0 10px;
}

button {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, red, orange);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* 🛒 CART */
.cart {
  background: white;
  color: black;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/en/6/6f/Monkey_D._Luffy.png">
  <div class="title">🔥 Atuko Store 🔥</div>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="https://wallpapercave.com/wp/wp8432343.jpg">
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
  <h3>🛒 السلة (<span id="count">0</span>)</h3>
  <div id="cartItems"></div>
  <hr>
  <b>الإجمالي: <span id="total">0</span> جنيه</b>
</div>

<script>
const products = [
  {
    name: "ستيكر لوفي",
    price: 20,
    image: "https://upload.wikimedia.org/wikipedia/en/6/6f/Monkey_D._Luffy.png"
  },
  {
    name: "تيشيرت ون بيس",
    price: 400,
    image: "https://wallpapercave.com/wp/wp7433809.jpg"
  },
  {
    name: "شنطة انمي",
    price: 250,
    image: "https://wallpapercave.com/wp/wp8432343.jpg"
  },
  {
    name: "مج دراجون بول",
    price: 50,
    image: "https://wallpapercave.com/wp/wp2757874.jpg"
  }
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p class="price">${p.price} جنيه</p>
        <button onclick="addToCart(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  updateCart();
}

function updateCart() {
  let total = 0;
  let html = "";

  cart.forEach((item) => {
    total += item.price;
    html += `<div>${item.name} - ${item.price} جنيه</div>`;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
